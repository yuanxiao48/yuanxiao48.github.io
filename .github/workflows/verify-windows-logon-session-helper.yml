name: Verify Windows logon session helper

on:
  push:
    branches:
      - verify/4a2-native-ddebf73d

permissions:
  contents: read

defaults:
  run:
    shell: cmd

jobs:
  native-x64-msvc:
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Verify source contract
        run: node scripts/test-windows-logon-session-helper-source-contract.mjs

      - name: Run JavaScript fake tests
        run: |
          node scripts/test-windows-logon-session-snapshot-protocol.mjs
          node scripts/test-windows-logon-session-snapshot-runner.mjs
          node scripts/test-windows-logon-session-liveness-provider.mjs
          node scripts/test-windows-logon-session-helper-source-contract.mjs

      - name: Configure and build native targets
        run: |
          echo Runner OS: %RUNNER_OS%
          echo Commit: %GITHUB_SHA%
          echo Generator: Visual Studio 17 2022 x64
          where cmake
          cmake --version
          for /f "usebackq delims=" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_PATH=%%I"
          if not defined VS_PATH exit /b 1
          echo Visual Studio: %VS_PATH%
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          cl
          echo Windows SDK: %WindowsSDKVersion%
          set "BUILD_DIR=%RUNNER_TEMP%\studio-4a2v-build"
          if exist "%BUILD_DIR%" exit /b 1
          cmake -S "%GITHUB_WORKSPACE%\native\windows-logon-session-snapshot-helper" -B "%BUILD_DIR%" -G "Visual Studio 17 2022" -A x64
          cmake --build "%BUILD_DIR%" --config Release --target windows_logon_session_protocol --verbose
          cmake --build "%BUILD_DIR%" --config Release --target windows-logon-session-snapshot-protocol-test --verbose
          cmake --build "%BUILD_DIR%" --config Release --target windows-logon-session-snapshot-helper --verbose
          set "PROTOCOL_TEST_EXE=%BUILD_DIR%\Release\windows-logon-session-snapshot-protocol-test.exe"
          set "HELPER_EXE=%BUILD_DIR%\Release\windows-logon-session-snapshot-helper.exe"
          if not exist "%PROTOCOL_TEST_EXE%" exit /b 1
          if not exist "%HELPER_EXE%" exit /b 1
          echo Protocol test: Release\windows-logon-session-snapshot-protocol-test.exe
          echo Helper link proof: Release\windows-logon-session-snapshot-helper.exe
          "%PROTOCOL_TEST_EXE%"
